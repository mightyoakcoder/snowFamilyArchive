steps:
  # Build Docker image, injecting VITE_* secrets as build args
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          --build-arg VITE_FIREBASE_API_KEY="$$VITE_FIREBASE_API_KEY" \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN="$$VITE_FIREBASE_AUTH_DOMAIN" \
          --build-arg VITE_FIREBASE_PROJECT_ID="$$VITE_FIREBASE_PROJECT_ID" \
          --build-arg VITE_FIREBASE_APP_ID="$$VITE_FIREBASE_APP_ID" \
          -t us-central1-docker.pkg.dev/snowarchive-486816/cloud-run-source-deploy/snowarchive:$BUILD_ID \
          -t us-central1-docker.pkg.dev/snowarchive-486816/cloud-run-source-deploy/snowarchive:latest \
          .
    secretEnv:
      - VITE_FIREBASE_API_KEY
      - VITE_FIREBASE_AUTH_DOMAIN
      - VITE_FIREBASE_PROJECT_ID
      - VITE_FIREBASE_APP_ID

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - 'us-central1-docker.pkg.dev/snowarchive-486816/cloud-run-source-deploy/snowarchive'

  # Deploy new image to Cloud Run (preserves existing secret/env config on the service)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - snowarchive
      - --image=us-central1-docker.pkg.dev/snowarchive-486816/cloud-run-source-deploy/snowarchive:$BUILD_ID
      - --region=us-central1
      - --platform=managed

availableSecrets:
  secretManager:
    - versionName: projects/snowarchive-486816/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: VITE_FIREBASE_API_KEY
    - versionName: projects/snowarchive-486816/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest
      env: VITE_FIREBASE_AUTH_DOMAIN
    - versionName: projects/snowarchive-486816/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest
      env: VITE_FIREBASE_PROJECT_ID
    - versionName: projects/snowarchive-486816/secrets/VITE_FIREBASE_APP_ID/versions/latest
      env: VITE_FIREBASE_APP_ID

images:
  - 'us-central1-docker.pkg.dev/snowarchive-486816/cloud-run-source-deploy/snowarchive:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/snowarchive-486816/cloud-run-source-deploy/snowarchive:latest'
